services:
  superlink:
    image: flwr/superlink:1.22.0
    command:
      - --fleet-api-address
      - 0.0.0.0:50053
      - --control-api-address
      - 0.0.0.0:50051
      - --serverappio-api-address
      - 0.0.0.0:50052
      - --insecure
      - --isolation
      - process
    ports:
      - 50051:50051

  superexec-serverapp:
    build:
      context: ${PROJECT_DIR:-.}
      dockerfile: superexec.Dockerfile
    command:
      - --insecure
      - --plugin-type
      - serverapp
      - --appio-api-address
      - superlink:50052
    restart: on-failure:3
    depends_on:
      - superlink

  supernode-1:
    image: flwr/supernode:1.22.0
    command:
      - --insecure
      - --superlink
      - superlink:50053
      - --clientappio-api-address
      - 0.0.0.0:50041
      - --isolation
      - process
      - --node-config
      - "partition-id=0 num-partitions=2"
    depends_on:
      - superlink

  # # supernode-2:

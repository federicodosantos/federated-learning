  #     - --insecure
  #     - --superlink
  #     - superlink:50053
  #     - --clientappio-api-address
  #     - 0.0.0.0:50043
  #     - --isolation
  #     - process
  #     - --node-config
  #     - "partition-id=1 num-partitions=2"
  #   depends_on:
  #     - superlink

  superexec-clientapp-1:
    build:
      context: ${PROJECT_DIR:-.}
      dockerfile: superexec.Dockerfile
    command:
      - --insecure
      - --plugin-type
      - clientapp
      - --appio-api-address
      - supernode-1:50041
    deploy:
      resources:
        limits:
          cpus: "2"
    stop_signal: SIGINT
    volumes:
      - client1_data:/app/data
    depends_on:
      - supernode-1


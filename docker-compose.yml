services:
  superlink:
    image: flwr/superlink:1.22.0
    command:
    - --fleet-api-address
    - 0.0.0.0:50053
    - --control-api-address
    - 0.0.0.0:50051
    - --serverappio-api-address
    - 0.0.0.0:50052
    - --insecure
    - --isolation
    - process
    ports:
    - 50051:50051
  superexec-serverapp:
    build:
      context: ${PROJECT_DIR:-.}
      dockerfile: superexec.Dockerfile
    command:
    - --insecure
    - --plugin-type
    - serverapp
    - --appio-api-address
    - superlink:50052
    restart: on-failure:3
    depends_on:
    - superlink
    volumes:
    - ./logs:/app/logs
  supernode-1:
    image: flwr/supernode:1.22.0
    command:
    - --insecure
    - --superlink
    - superlink:50053
    - --clientappio-api-address
    - 0.0.0.0:50041
    - --isolation
    - process
    - --node-config
    - partition-id=0 num-partitions=10
    depends_on:
    - superlink
  superexec-clientapp-1:
    build:
      context: ${PROJECT_DIR:-.}
      dockerfile: superexec.Dockerfile
    command:
    - --insecure
    - --plugin-type
    - clientapp
    - --appio-api-address
    - supernode-1:50041
    deploy:
      resources:
        limits:
          cpus: '2'
    stop_signal: SIGINT
    volumes:
    - client1_data:/app/data
    depends_on:
    - supernode-1
  supernode-2:
    image: flwr/supernode:1.22.0
    command:
    - --insecure
